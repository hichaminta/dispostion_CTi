<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTI Shield – Source Viewer</title>
  <meta name="description" content="Sous-dashboard CTI par source: vérification des données et lancement des scripts d'extraction.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg0: #070a10;
      --bg1: #0d1117;
      --bg2: #161b22;
      --bg3: #1e2530;
      --border: rgba(255,255,255,0.06);
      --primary: #60a5fa;
      --primary-glow: rgba(96,165,250,0.18);
      --accent: #a78bfa;
      --accent-glow: rgba(167,139,250,0.18);
      --green: #34d399;
      --green-glow: rgba(52,211,153,0.18);
      --amber: #fbbf24;
      --amber-glow: rgba(251,191,36,0.18);
      --red: #f87171;
      --red-glow: rgba(248,113,113,0.18);
      --txt1: #f1f5f9;
      --txt2: #94a3b8;
      --txt3: #475569;
      --mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg0);
      color: var(--txt1);
      min-height: 100vh;
    }

    /* ── TOP HEADER ── */
    .top-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7,10,16,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .top-header img { height: 32px; }
    .top-header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--txt1);
      letter-spacing: -0.3px;
    }
    .top-header h1 span { color: var(--primary); }
    .back-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--txt2);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--primary); border-color: var(--primary); }

    /* ── MAIN LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 56px);
    }

    /* ── SOURCE SIDEBAR ── */
    .source-sidebar {
      background: var(--bg1);
      border-right: 1px solid var(--border);
      padding: 1.2rem 0;
      overflow-y: auto;
      height: calc(100vh - 56px);
      position: sticky;
      top: 56px;
    }
    .sidebar-title {
      padding: 0 1.2rem 0.8rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .source-nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1.2rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      position: relative;
    }
    .source-nav-item:hover { background: var(--bg2); }
    .source-nav-item.active {
      background: var(--bg2);
      border-left-color: var(--primary);
    }
    .source-nav-item.active .src-icon { color: var(--primary); }
    .src-icon { color: var(--txt3); flex-shrink: 0; }
    .src-nav-info { flex: 1; min-width: 0; }
    .src-nav-name { font-size: 0.85rem; font-weight: 600; }
    .src-nav-count { font-size: 0.72rem; color: var(--txt3); }
    .src-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--txt3);
      flex-shrink: 0;
    }
    .src-status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .src-status-dot.error  { background: var(--red); }
    .sidebar-run-all {
      margin: 0.8rem 1.2rem;
      padding: 0.55rem 1rem;
      width: calc(100% - 2.4rem);
      background: linear-gradient(135deg, rgba(96,165,250,0.15), rgba(167,139,250,0.1));
      border: 1px solid rgba(96,165,250,0.3);
      border-radius: 8px;
      color: var(--primary);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      transition: all 0.2s;
    }
    .sidebar-run-all:hover { background: rgba(96,165,250,0.2); }

    /* ── CONTENT AREA ── */
    .content-area {
      padding: 2rem;
      overflow-y: auto;
    }

    /* ── SOURCE PANEL ── */
    .source-panel { display: none; }
    .source-panel.active { display: block; }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .panel-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .panel-src-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--primary-glow);
      border: 1px solid rgba(96,165,250,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }
    .panel-title h2 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .panel-title h2 span { color: var(--primary); }
    .panel-title p {
      font-size: 0.8rem;
      color: var(--txt3);
      margin-top: 0.2rem;
      font-family: var(--mono);
    }

    /* ── RUN BUTTON ── */
    .run-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.4rem;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(34,197,94,0.25);
    }
    .run-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34,197,94,0.35); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .run-btn.running {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 4px 15px rgba(245,158,11,0.25);
      animation: pulse-btn 1.5s infinite;
    }
    @keyframes pulse-btn {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.75; }
    }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .stat-chip {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
    }
    .stat-chip .sc-label { font-size: 0.7rem; color: var(--txt3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-chip .sc-val   { font-size: 1.35rem; font-weight: 800; color: var(--txt1); margin-top: 0.15rem; }
    .stat-chip .sc-sub   { font-size: 0.7rem; color: var(--txt3); margin-top: 0.1rem; font-family: var(--mono); }

    /* ── TERMINAL LOG ── */
    .log-box {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1.5rem;
      overflow: hidden;
      display: none;
    }
    .log-box.visible { display: block; }
    .log-box-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--txt2);
    }
    .log-dot { width: 8px; height: 8px; border-radius: 50%; }
    .log-terminal {
      padding: 0.8rem 1rem;
      max-height: 260px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 0.77rem;
      line-height: 1.6;
    }
    .log-line { color: var(--txt2); white-space: pre-wrap; word-break: break-all; }
    .log-line.ok     { color: var(--green); }
    .log-line.warn   { color: var(--amber); }
    .log-line.err    { color: var(--red); }
    .log-line.info   { color: var(--primary); }
    .log-status-banner {
      padding: 0.5rem 1rem;
      font-size: 0.78rem;
      font-weight: 600;
      text-align: center;
    }
    .log-status-banner.done  { background: var(--green-glow);  color: var(--green); }
    .log-status-banner.error { background: var(--red-glow);    color: var(--red); }
    .log-status-banner.run   { background: var(--amber-glow);  color: var(--amber); }

    /* ── DATA PREVIEW TABLE ── */
    .table-section { background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .table-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.2rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .table-section-header h3 { font-size: 0.9rem; font-weight: 700; }
    .table-section-header .badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      font-size: 0.72rem;
      color: var(--txt3);
      font-family: var(--mono);
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 0.65rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: var(--txt2);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); color: var(--txt1); }
    .td-mono { font-family: var(--mono); font-size: 0.75rem; color: var(--primary); }
    .td-type {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(96,165,250,0.15);
      color: var(--primary);
    }
    .td-ioc-count {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(52,211,153,0.15);
      color: var(--green);
      font-family: var(--mono);
    }
    .td-cve-count {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(167,139,250,0.15);
      color: var(--accent);
      font-family: var(--mono);
    }

    /* ── EMPTY / LOADING STATES ── */
    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--txt3);
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.88rem; }
    .loading-row td { color: var(--txt3); font-style: italic; }

    /* ── EXPAND RAW BUTTON ── */
    .expand-raw-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.45rem;
      color: var(--txt3);
      cursor: pointer;
      font-size: 0.68rem;
      font-family: var(--mono);
      transition: all 0.15s;
    }
    .expand-raw-btn:hover { color: var(--primary); border-color: var(--primary); }

    /* ── RAW MODAL ── */
    .raw-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .raw-overlay.open { display: flex; }
    .raw-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 760px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .raw-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .raw-card-header h3 { font-size: 0.9rem; font-weight: 700; }
    .close-raw { background: none; border: none; color: var(--txt3); cursor: pointer; font-size: 1.3rem; line-height: 1; }
    .close-raw:hover { color: var(--txt1); }
    .raw-body { overflow-y: auto; padding: 1rem 1.2rem; flex: 1; }
    .raw-pre {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--txt2);
      white-space: pre;
      line-height: 1.6;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    /* ── SPINNER ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }

    /* ── TRACKING INFO ── */
    .tracking-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .tracking-chip {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      font-size: 0.73rem;
    }
    .tracking-chip .tc-label { color: var(--txt3); font-weight: 500; }
    .tracking-chip .tc-val   { color: var(--txt1); font-family: var(--mono); margin-left: 0.35rem; }

    /* ── TABS ── */
    .tab-bar {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      padding: 0.5rem 1rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--txt3);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: var(--txt1); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="top-header">
  <img src="bluesec-logo.png" alt="Bluesec">
  <h1>CTI Shield — <span>Source Viewer</span></h1>
  <a href="index.html" class="back-btn">
    <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
    Retour Dashboard
  </a>
</header>

<div class="layout">
  <!-- ── LEFT: SOURCE NAV ── -->
  <aside class="source-sidebar">
    <div class="sidebar-title">Sources CTI</div>
    <div id="sourceNavList">
      <!-- populated by JS -->
    </div>
  </aside>

  <!-- ── RIGHT: PANEL ── -->
  <main class="content-area" id="contentArea">
    <div id="panels">
      <!-- populated by JS -->
    </div>
  </main>
</div>

<!-- ── RAW ENTRY MODAL ── -->
<div class="raw-overlay" id="rawOverlay">
  <div class="raw-card">
    <div class="raw-card-header">
      <h3 id="rawModalTitle">Entrée brute</h3>
      <button class="close-raw" id="closeRaw">&times;</button>
    </div>
    <div class="raw-body">
      <pre class="raw-pre" id="rawPre"></pre>
    </div>
  </div>
</div>

<script>
/* ============================================================
   SOURCE VIEWER – script
   ============================================================ */

const SOURCES = [
  { id: 'abuseipdb',     label: 'AbuseIPDB',      icon: 'shield-alert',    desc: 'abuseipdb_extractor.py' },
  { id: 'alienvault',    label: 'AlienVault OTX',  icon: 'radio',           desc: 'alienvault_extractor.py' },
  { id: 'cins_army',     label: 'CINS Army',       icon: 'swords',          desc: 'cins_army_extractor.py' },
  { id: 'feodotracker',  label: 'FeodoTracker',    icon: 'bug',             desc: 'feodotracker_extractor.py' },
  { id: 'malwarebazaar', label: 'MalwareBazaar',   icon: 'package-x',       desc: 'malwarebazaar_extractor.py' },
  { id: 'nvd',           label: 'NVD (CVE)',        icon: 'database-zap',    desc: 'nvd_extractor.py' },
  { id: 'openphish',     label: 'OpenPhish',       icon: 'fish',            desc: 'openphish_extractor.py' },
  { id: 'phishtank',     label: 'PhishTank',       icon: 'anchor',          desc: 'phishtank_extractor.py' },
  { id: 'pulsedive',     label: 'Pulsedive',       icon: 'activity',        desc: 'pulsedive_extractor.py' },
  { id: 'threatfox',     label: 'ThreatFox',       icon: 'biohazard',       desc: 'threatfox_extractor.py' },
  { id: 'urlhaus',       label: 'URLhaus',         icon: 'link',            desc: 'urlhaus_extractor.py' },
  { id: 'virustotal',    label: 'VirusTotal',      icon: 'scan-eye',        desc: 'virustotal_extractor.py' },
];

// State per source
const state = {};
SOURCES.forEach(s => {
  state[s.id] = { loaded: false, data: null, jobId: null, jobStatus: null, activeTab: 'iocs' };
});

let activeSource = SOURCES[0].id;

/* ──────────────────────────────────────────────────────────
   BUILD SIDEBAR + PANELS
   ────────────────────────────────────────────────────────── */
function buildUI() {
  const navList = document.getElementById('sourceNavList');
  const panelsEl = document.getElementById('panels');

  navList.innerHTML = '';
  panelsEl.innerHTML = '';

  SOURCES.forEach(src => {
    // Nav item
    const li = document.createElement('div');
    li.className = 'source-nav-item' + (src.id === activeSource ? ' active' : '');
    li.id = `nav-${src.id}`;
    li.innerHTML = `
      <i data-lucide="${src.icon}" class="src-icon" style="width:16px;height:16px;"></i>
      <div class="src-nav-info">
        <div class="src-nav-name">${src.label}</div>
        <div class="src-nav-count" id="nav-count-${src.id}">—</div>
      </div>
      <div class="src-status-dot" id="nav-dot-${src.id}"></div>`;
    li.onclick = () => switchSource(src.id);
    navList.appendChild(li);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'source-panel' + (src.id === activeSource ? ' active' : '');
    panel.id = `panel-${src.id}`;
    panel.innerHTML = buildPanelHTML(src);
    panelsEl.appendChild(panel);
  });

  lucide.createIcons();
}

function buildPanelHTML(src) {
  return `
    <div class="panel-header">
      <div class="panel-title">
        <div class="panel-src-icon"><i data-lucide="${src.icon}" style="width:22px;height:22px;"></i></div>
        <div>
          <h2><span>${src.label}</span></h2>
          <p>${src.desc}</p>
        </div>
      </div>
      <button class="run-btn" id="run-btn-${src.id}" onclick="runScript('${src.id}')">
        <i data-lucide="play-circle" style="width:16px;height:16px;"></i>
        Lancer le script
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-strip" id="stats-${src.id}">
      <div class="stat-chip"><div class="sc-label">Total entrées</div><div class="sc-val" id="stat-total-${src.id}">—</div><div class="sc-sub">records</div></div>
      <div class="stat-chip"><div class="sc-label">Total IOCs</div><div class="sc-val" id="stat-iocs-${src.id}">—</div><div class="sc-sub">indicateurs</div></div>
      <div class="stat-chip"><div class="sc-label">Total CVEs</div><div class="sc-val" id="stat-cves-${src.id}">—</div><div class="sc-sub">vulnérabilités</div></div>
      <div class="stat-chip"><div class="sc-label">Taille fichier</div><div class="sc-val" id="stat-size-${src.id}">—</div><div class="sc-sub">Mo</div></div>
    </div>

    <!-- Tracking -->
    <div class="tracking-chips" id="tracking-${src.id}"></div>

    <!-- Terminal Log -->
    <div class="log-box" id="log-box-${src.id}">
      <div class="log-box-header">
        <div class="log-dot" id="log-dot-${src.id}" style="background:#475569;"></div>
        <span id="log-status-label-${src.id}">Script: ${src.desc}</span>
        <span style="margin-left:auto;font-size:0.7rem;color:var(--txt3);" id="log-time-${src.id}"></span>
      </div>
      <div class="log-terminal" id="log-terminal-${src.id}"></div>
      <div class="log-status-banner" id="log-banner-${src.id}" style="display:none;"></div>
    </div>

    <!-- Tabs: IOC / CVE / Raw -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-iocs-${src.id}" onclick="switchTab('${src.id}','iocs')">
        <i data-lucide="binary" style="width:13px;height:13px;vertical-align:middle;margin-right:4px;"></i>IOCs
      </button>
      <button class="tab-btn" id="tab-cves-${src.id}" onclick="switchTab('${src.id}','cves')">
        <i data-lucide="bug" style="width:13px;height:13px;vertical-align:middle;margin-right:4px;"></i>CVEs
      </button>
      <button class="tab-btn" id="tab-raw-${src.id}" onclick="switchTab('${src.id}','raw')">
        <i data-lucide="code-2" style="width:13px;height:13px;vertical-align:middle;margin-right:4px;"></i>Entrées brutes
      </button>
    </div>

    <!-- IOC Tab -->
    <div class="tab-content active" id="tab-content-iocs-${src.id}">
      <div class="table-section">
        <div class="table-section-header">
          <h3>Indicateurs (IOC)</h3>
          <span class="badge" id="ioc-badge-${src.id}">Chargement...</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Valeur</th><th>Type</th><th>Première vue</th><th>Dernière vue</th><th>Tags</th></tr></thead>
            <tbody id="ioc-tbody-${src.id}"><tr class="loading-row"><td colspan="6" style="text-align:center;padding:2rem;color:var(--txt3);">Chargement des données...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- CVE Tab -->
    <div class="tab-content" id="tab-content-cves-${src.id}">
      <div class="table-section">
        <div class="table-section-header">
          <h3>Vulnérabilités (CVE)</h3>
          <span class="badge" id="cve-badge-${src.id}">Chargement...</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>CVE ID</th><th>Sévérité</th><th>Score</th><th>Publication</th><th>Description</th></tr></thead>
            <tbody id="cve-tbody-${src.id}"><tr class="loading-row"><td colspan="6" style="text-align:center;padding:2rem;color:var(--txt3);">Chargement des données...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Raw Entries Tab -->
    <div class="tab-content" id="tab-content-raw-${src.id}">
      <div class="table-section">
        <div class="table-section-header">
          <h3>Entrées brutes (échantillon)</h3>
          <span class="badge" id="raw-badge-${src.id}">Chargement...</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Source</th><th>IOCs</th><th>CVEs</th><th>Collecté le</th><th>Détails</th></tr></thead>
            <tbody id="raw-tbody-${src.id}"><tr class="loading-row"><td colspan="6" style="text-align:center;padding:2rem;color:var(--txt3);">Chargement des données...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

/* ──────────────────────────────────────────────────────────
   SWITCH SOURCE
   ────────────────────────────────────────────────────────── */
function switchSource(id) {
  // Update nav
  document.querySelectorAll('.source-nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${id}`).classList.add('active');

  // Update panel
  document.querySelectorAll('.source-panel').forEach(el => el.classList.remove('active'));
  document.getElementById(`panel-${id}`).classList.add('active');

  activeSource = id;

  // Load data if not already
  if (!state[id].loaded) {
    loadSourceData(id);
  }
}

/* ──────────────────────────────────────────────────────────
   SWITCH TAB
   ────────────────────────────────────────────────────────── */
function switchTab(srcId, tab) {
  ['iocs', 'cves', 'raw'].forEach(t => {
    document.getElementById(`tab-${t}-${srcId}`).classList.toggle('active', t === tab);
    document.getElementById(`tab-content-${t}-${srcId}`).classList.toggle('active', t === tab);
  });
  state[srcId].activeTab = tab;
}

/* ──────────────────────────────────────────────────────────
   LOAD SOURCE DATA (preview API)
   ────────────────────────────────────────────────────────── */
async function loadSourceData(srcId) {
  try {
    const resp = await fetch(`/api/preview/${srcId}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    state[srcId].data = json;
    state[srcId].loaded = true;
    renderSourceData(srcId, json);
  } catch(e) {
    console.error(`Failed to load ${srcId}:`, e);
    setError(srcId, e.message);
  }
}

function renderSourceData(srcId, info) {
  const { total, preview, tracking, size_bytes, error } = info;

  // Stats
  const allIocs = (preview||[]).flatMap(e => e.iocs||[]);
  const allCves = (preview||[]).flatMap(e => e.cves||[]);

  const totalIocCount = (preview||[]).reduce((s,e) => s+(e.iocs||[]).length, 0);
  const totalCveCount = (preview||[]).reduce((s,e) => s+(e.cves||[]).length, 0);
  const mb = size_bytes ? (size_bytes/1048576).toFixed(1) : '—';

  const el = (id) => document.getElementById(id);
  const setText = (id, v) => { const e = el(id); if(e) e.textContent = v; };

  setText(`stat-total-${srcId}`, (total||0).toLocaleString());
  setText(`stat-iocs-${srcId}`,  totalIocCount.toLocaleString());
  setText(`stat-cves-${srcId}`,  totalCveCount.toLocaleString());
  setText(`stat-size-${srcId}`,  mb);

  // Nav count
  setText(`nav-count-${srcId}`, `${(total||0).toLocaleString()} entrées`);

  // Dot
  const dot = el(`nav-dot-${srcId}`);
  if (dot) dot.className = 'src-status-dot ' + (total > 0 ? 'online' : '');

  // Tracking chips
  const tEl = el(`tracking-${srcId}`);
  if (tEl && tracking) {
    const last  = tracking.recent_extracted_at  ? fmtDate(tracking.recent_extracted_at)  : 'Jamais';
    const first = tracking.oldest_extracted_at   ? fmtDate(tracking.oldest_extracted_at)   : 'N/A';
    tEl.innerHTML = `
      <div class="tracking-chip"><span class="tc-label">Dernière extraction:</span><span class="tc-val">${last}</span></div>
      <div class="tracking-chip"><span class="tc-label">Première extraction:</span><span class="tc-val">${first}</span></div>
    `;
  }

  // IOC table
  renderIOCTable(srcId, allIocs, total);

  // CVE table
  renderCVETable(srcId, allCves, total);

  // Raw table
  renderRawTable(srcId, preview||[], total);
}

function renderIOCTable(srcId, iocs, total) {
  const tbody = document.getElementById(`ioc-tbody-${srcId}`);
  const badge = document.getElementById(`ioc-badge-${srcId}`);
  if (!tbody) return;

  if (!iocs || iocs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--txt3);">Aucun IOC trouvé dans cet échantillon</td></tr>`;
    if (badge) badge.textContent = '0 IOCs';
    return;
  }

  if (badge) badge.textContent = `${iocs.length.toLocaleString()} IOCs (échantillon de ${total.toLocaleString()})`;

  tbody.innerHTML = iocs.slice(0, 100).map((ioc, i) => {
    const tags = Array.isArray(ioc.tags) && ioc.tags.length
      ? ioc.tags.slice(0,3).map(t => `<span style="background:rgba(167,139,250,0.15);color:#a78bfa;padding:0.1rem 0.35rem;border-radius:3px;font-size:0.68rem;">${esc(t)}</span>`).join(' ')
      : '<span style="color:var(--txt3)">—</span>';
    const fs = ioc.first_seen ? fmtDate(ioc.first_seen) : '—';
    const ls = ioc.last_seen  ? fmtDate(ioc.last_seen)  : '—';
    return `<tr>
      <td class="td-mono" style="color:var(--txt3);width:40px;">${i+1}</td>
      <td class="td-mono" style="max-width:240px;">${esc(ioc.value||'—')}</td>
      <td><span class="td-type">${esc(ioc.ioc_type||'unknown')}</span></td>
      <td style="color:var(--txt3);font-size:0.75rem;">${fs}</td>
      <td style="color:var(--txt3);font-size:0.75rem;">${ls}</td>
      <td>${tags}</td>
    </tr>`;
  }).join('');
}

function renderCVETable(srcId, cves, total) {
  const tbody = document.getElementById(`cve-tbody-${srcId}`);
  const badge = document.getElementById(`cve-badge-${srcId}`);
  if (!tbody) return;

  if (!cves || cves.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--txt3);">Aucun CVE dans cet échantillon</td></tr>`;
    if (badge) badge.textContent = '0 CVEs';
    return;
  }

  if (badge) badge.textContent = `${cves.length.toLocaleString()} CVEs (échantillon)`;

  const sevColor = s => {
    const u = (s||'').toUpperCase();
    if (u==='CRITICAL') return '#f87171';
    if (u==='HIGH')     return '#fb923c';
    if (u==='MEDIUM')   return '#fbbf24';
    if (u==='LOW')      return '#34d399';
    return '#94a3b8';
  };

  tbody.innerHTML = cves.slice(0, 100).map((cve, i) => {
    const sev = cve.severity || 'N/A';
    const col = sevColor(sev);
    const score = cve.score != null ? cve.score.toFixed(1) : '—';
    const pub = cve.published_date ? fmtDate(cve.published_date) : '—';
    const desc = cve.description ? cve.description.substring(0,100)+'…' : '—';
    return `<tr>
      <td class="td-mono" style="color:var(--txt3);width:40px;">${i+1}</td>
      <td class="td-mono" style="color:#a78bfa;">${esc(cve.cve_id||'—')}</td>
      <td><span style="color:${col};font-size:0.75rem;font-weight:600;">${esc(sev)}</span></td>
      <td class="td-mono">${score}</td>
      <td style="color:var(--txt3);font-size:0.75rem;">${pub}</td>
      <td style="color:var(--txt2);max-width:300px;">${esc(desc)}</td>
    </tr>`;
  }).join('');
}

function renderRawTable(srcId, entries, total) {
  const tbody = document.getElementById(`raw-tbody-${srcId}`);
  const badge = document.getElementById(`raw-badge-${srcId}`);
  if (!tbody) return;

  if (!entries || entries.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--txt3);">Aucune entrée disponible</td></tr>`;
    if (badge) badge.textContent = '0 entrées';
    return;
  }

  if (badge) badge.textContent = `${entries.length} / ${total} entrées (échantillon)`;

  tbody.innerHTML = entries.map((entry, i) => {
    const src = entry.source || '—';
    const iocCount = (entry.iocs||[]).length;
    const cveCount = (entry.cves||[]).length;
    const col = entry.collected_at ? fmtDate(entry.collected_at) : '—';
    return `<tr>
      <td class="td-mono" style="color:var(--txt3);width:40px;">${i+1}</td>
      <td style="font-weight:600;color:var(--primary);">${esc(src)}</td>
      <td><span class="td-ioc-count">${iocCount}</span></td>
      <td><span class="td-cve-count">${cveCount}</span></td>
      <td style="color:var(--txt3);font-size:0.75rem;">${col}</td>
      <td><button class="expand-raw-btn" onclick="openRaw(${i},'${srcId}')">JSON</button></td>
    </tr>`;
  }).join('');
}

function setError(srcId, msg) {
  const dot = document.getElementById(`nav-dot-${srcId}`);
  if (dot) dot.className = 'src-status-dot error';
  const tbody = document.getElementById(`ioc-tbody-${srcId}`);
  if (tbody) tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--red);">Erreur: ${esc(msg)}</td></tr>`;
}

/* ──────────────────────────────────────────────────────────
   RUN SCRIPT
   ────────────────────────────────────────────────────────── */
async function runScript(srcId) {
  const btn = document.getElementById(`run-btn-${srcId}`);
  const logBox = document.getElementById(`log-box-${srcId}`);
  const terminal = document.getElementById(`log-terminal-${srcId}`);
  const logDot = document.getElementById(`log-dot-${srcId}`);
  const banner = document.getElementById(`log-banner-${srcId}`);
  const labelEl = document.getElementById(`log-status-label-${srcId}`);

  if (!btn || !logBox || !terminal) return;

  // Show log box
  logBox.classList.add('visible');
  terminal.innerHTML = '';
  banner.style.display = 'none';
  banner.className = 'log-status-banner';

  // Set running state
  btn.disabled = true;
  btn.className = 'run-btn running';
  btn.innerHTML = `<span class="spinner"></span> En cours...`;
  if (logDot) { logDot.style.background = '#fbbf24'; logDot.style.boxShadow = '0 0 6px #fbbf24'; }
  if (labelEl) labelEl.textContent = `Exécution: ${srcId}_extractor.py`;

  // Launch job
  let jobId = null;
  try {
    const r = await fetch(`/api/run/${srcId}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const j = await r.json();
    jobId = j.job_id;
    state[srcId].jobId = jobId;
  } catch(e) {
    appendLog(terminal, `[ERROR] Impossible de démarrer le script: ${e.message}`, 'err');
    resetRunBtn(srcId);
    return;
  }

  // Poll job status
  let lastLen = 0;
  const startTime = Date.now();
  const timeEl = document.getElementById(`log-time-${srcId}`);

  const poll = async () => {
    try {
      const r = await fetch(`/api/job/${jobId}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const job = await r.json();

      // Append new lines
      const lines = job.lines || [];
      for (let i = lastLen; i < lines.length; i++) {
        appendLog(terminal, lines[i]);
      }
      lastLen = lines.length;

      // Update timer
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      if (timeEl) timeEl.textContent = `${elapsed}s`;

      if (job.status === 'running' || job.status === 'pending') {
        setTimeout(poll, 700);
      } else {
        // Done or error
        const ok = job.status === 'done';
        if (logDot) {
          logDot.style.background = ok ? '#34d399' : '#f87171';
          logDot.style.boxShadow  = ok ? '0 0 6px #34d399' : '0 0 6px #f87171';
        }
        banner.style.display = 'block';
        banner.className = 'log-status-banner ' + (ok ? 'done' : 'error');
        banner.textContent = ok
          ? `✓ Script terminé avec succès (${((Date.now()-startTime)/1000).toFixed(1)}s)`
          : `✗ Erreur lors de l'exécution (code: ${job.returncode})`;
        resetRunBtn(srcId);
        // Reload data after success
        if (ok) {
          state[srcId].loaded = false;
          setTimeout(() => loadSourceData(srcId), 500);
        }
      }
    } catch(e) {
      appendLog(terminal, `[POLL ERROR] ${e.message}`, 'err');
      resetRunBtn(srcId);
    }
  };

  setTimeout(poll, 500);
}

function resetRunBtn(srcId) {
  const btn = document.getElementById(`run-btn-${srcId}`);
  if (!btn) return;
  btn.disabled = false;
  btn.className = 'run-btn';
  btn.innerHTML = `<i data-lucide="play-circle" style="width:16px;height:16px;"></i> Lancer le script`;
  lucide.createIcons();
}

function appendLog(terminal, line, cls) {
  const el = document.createElement('div');
  el.className = 'log-line';
  // Auto-classify
  if (!cls) {
    const l = (line||'').toLowerCase();
    if (l.includes('error') || l.includes('exception') || l.includes('failed')) cls = 'err';
    else if (l.includes('warning') || l.includes('warn') || l.includes('skip')) cls = 'warn';
    else if (l.includes('completed') || l.includes('success') || l.includes('done')) cls = 'ok';
    else if (l.includes('processing') || l.includes('running') || l.includes('starting')) cls = 'info';
  }
  if (cls) el.classList.add(cls);
  el.textContent = line || '';
  terminal.appendChild(el);
  terminal.scrollTop = terminal.scrollHeight;
}

/* ──────────────────────────────────────────────────────────
   RAW MODAL
   ────────────────────────────────────────────────────────── */
function openRaw(idx, srcId) {
  const overlay = document.getElementById('rawOverlay');
  const pre = document.getElementById('rawPre');
  const title = document.getElementById('rawModalTitle');
  if (!overlay || !pre) return;

  const data = state[srcId].data;
  if (!data || !data.preview || !data.preview[idx]) return;

  const entry = data.preview[idx];
  title.textContent = `Entrée brute #${idx+1} — ${srcId}`;
  pre.textContent = JSON.stringify(entry, null, 2);
  overlay.classList.add('open');
}

document.getElementById('closeRaw').onclick = () => {
  document.getElementById('rawOverlay').classList.remove('open');
};
document.getElementById('rawOverlay').onclick = (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
};

/* ──────────────────────────────────────────────────────────
   HELPERS
   ────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(s) {
  try { return new Date(s).toLocaleString('fr-FR', { dateStyle:'short', timeStyle:'short' }); }
  catch { return String(s); }
}

/* ──────────────────────────────────────────────────────────
   INIT
   ────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  buildUI();
  // Load first source
  loadSourceData(SOURCES[0].id);
  // Pre-load all sidebar counts (lightweight)
  loadAllCounts();
});

async function loadAllCounts() {
  for (const src of SOURCES) {
    try {
      const r = await fetch(`/api/preview/${src.id}`);
      if (!r.ok) continue;
      const j = await r.json();
      const el = document.getElementById(`nav-count-${src.id}`);
      if (el) el.textContent = `${(j.total||0).toLocaleString()} entrées`;
      const dot = document.getElementById(`nav-dot-${src.id}`);
      if (dot) dot.className = 'src-status-dot ' + (j.total > 0 ? 'online' : '');
    } catch(e) {}
    await new Promise(r => setTimeout(r, 150)); // small delay
  }
}
